name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      # The FileMaker Plugin SDK is covered by the Claris licence and cannot be
      # committed. It is stored as an asset on the sdk-assets pre-release.
      # To update it: gh release upload sdk-assets sdk.zip --clobber
      - name: Restore FileMaker SDK
        shell: bash
        run: gh release download sdk-assets --pattern sdk.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract FileMaker SDK
        shell: pwsh
        run: |
          Expand-Archive -Path sdk.zip -DestinationPath . -Force
          Remove-Item sdk.zip

      # OpenSSL takes ~5 minutes to build; cache it keyed on version so it only
      # rebuilds when we bump OPENSSL_VERSION in build-openssl-win.bat.
      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4.2.3
        with:
          path: third_party/openssl/win
          key: openssl-win-3.3.2

      # Set up the MSVC developer environment so cl.exe, nmake, and ninja are on
      # PATH. Required for both the OpenSSL build and the CMake Ninja build.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        shell: cmd
        run: scripts\build-openssl-win.bat

      - name: Configure
        shell: cmd
        run: cmake -S . -B build\win -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: cmake --build build\win

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: AMQPFMPlugin-win
          path: |
            build\win\AMQPFMPlugin.fmx64
            build\win\cacert.pem
          retention-days: 30
